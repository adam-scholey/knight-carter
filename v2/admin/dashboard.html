<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Dashboard | Carter & Knight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css?v=1">
</head>
<body style="background:var(--cream);">

  <!-- Admin Topbar -->
  <div class="admin-topbar">
    <div class="admin-topbar-inner">
      <a href="../index.html" class="nav-logo" style="color:var(--white);">Carter &amp; Knight</a>
      <span class="admin-topbar-label">Admin Dashboard</span>
      <button class="btn btn-outline" id="logoutBtn" style="margin-left:auto;">Log Out</button>
    </div>
  </div>

  <div class="container" style="padding-top:48px;padding-bottom:80px;">

    <div class="admin-actions-row">
      <div>
        <h2 style="margin-bottom:4px;">Properties</h2>
        <p id="propertyCount" style="font-size:14px;"></p>
      </div>
      <div class="admin-actions-buttons">
        <a href="property-edit.html" class="btn btn-primary">Add New Property</a>
        <button class="btn btn-outline-dark" id="exportBtn">Export JSON</button>
        <label class="btn btn-outline-dark" for="importInput" style="cursor:pointer;">
          Import JSON
          <input type="file" id="importInput" accept="application/json" style="display:none;">
        </label>
      </div>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Address</th>
            <th>Town</th>
            <th>Price (pcm)</th>
            <th>Type</th>
            <th>Status</th>
            <th>Views</th>
            <th>Inquiries</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="propertyTableBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>

  </div>

  <script src="../js/search.js?v=1"></script>
  <script src="../js/admin.js?v=1"></script>
  <script>
    requireAuth();

    function renderTable() {
      const list = loadProperties();
      const analytics = loadAnalytics();
      const tbody = document.getElementById('propertyTableBody');
      const countEl = document.getElementById('propertyCount');
      countEl.textContent = `${list.length} propert${list.length === 1 ? 'y' : 'ies'} in the portfolio`;

      if (list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted);">No properties yet. Add your first one.</td></tr>`;
        return;
      }

      tbody.innerHTML = list.map(p => {
        const stats = analytics[p.id] || { views: 0, inquiries: 0 };
        return `
          <tr>
            <td>${p.address}</td>
            <td>${p.town}</td>
            <td>£${p.pricePcm.toLocaleString('en-GB')}</td>
            <td>${p.type}</td>
            <td>
              <select class="filter-select status-select" data-id="${p.id}" style="min-width:140px;">
                <option value="Available" ${p.status === 'Available' ? 'selected' : ''}>Available</option>
                <option value="Let Agreed" ${p.status === 'Let Agreed' ? 'selected' : ''}>Let Agreed</option>
                <option value="Under Offer" ${p.status === 'Under Offer' ? 'selected' : ''}>Under Offer</option>
              </select>
            </td>
            <td>${stats.views}</td>
            <td>${stats.inquiries}</td>
            <td class="admin-row-actions">
              <a href="property-edit.html?id=${p.id}" class="btn-sm btn-sm-outline">Edit</a>
              <button class="btn-sm btn-sm-danger" data-delete="${p.id}">Delete</button>
            </td>
          </tr>
        `;
      }).join('');

      tbody.querySelectorAll('.status-select').forEach(select => {
        select.addEventListener('change', (e) => {
          const id = parseInt(e.target.dataset.id);
          const property = getPropertyById(id);
          if (!property) return;
          property.status = e.target.value;
          property.availableDate = e.target.value === 'Available' ? 'Available Now' : e.target.value;
          upsertProperty(property);
          renderTable();
        });
      });

      tbody.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(e.target.dataset.delete);
          const property = getPropertyById(id);
          if (!property) return;
          if (confirm(`Delete ${property.address}, ${property.town}? This cannot be undone.`)) {
            deleteProperty(id);
            renderTable();
          }
        });
      });
    }

    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('exportBtn').addEventListener('click', exportPropertiesJson);
    document.getElementById('importInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      importPropertiesJson(file, (err) => {
        if (err) {
          alert('Import failed: ' + err.message);
        } else {
          alert('Properties imported successfully.');
          renderTable();
        }
        e.target.value = '';
      });
    });

    renderTable();
  </script>
</body>
</html>
