<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login | Carter & Knight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css?v=1">
</head>
<body style="background:var(--navy);min-height:100vh;">

  <div class="admin-login-wrap">
    <div class="admin-login-card fade-up visible">
      <a href="../index.html" class="nav-logo" style="color:var(--navy);display:block;text-align:center;margin-bottom:8px;">Carter &amp; Knight</a>
      <p style="text-align:center;color:var(--text-muted);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:32px;">Admin Panel</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter admin password" required autofocus>
        </div>
        <p id="loginError" style="color:#c0392b;font-size:13px;margin-bottom:16px;display:none;">Incorrect password. Please try again.</p>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
          Sign In
        </button>
      </form>

      <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:24px;">
        This is an MVP client-side login. Not suitable for production use without a backend.
      </p>
    </div>
  </div>

  <script src="../js/search.js?v=1"></script>
  <script src="../js/admin.js?v=1"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (isSessionValid()) {
        window.location.href = 'dashboard.html';
      }
      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('loginError');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const ok = await attemptLogin(password);
        if (ok) {
          window.location.href = 'dashboard.html';
        } else {
          errorEl.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
